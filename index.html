<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中学校 数学 小テスト作成ツール</title>
    
    <!-- Tailwind CSS (スタイリング用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel (ブラウザ上でReactコードを変換するため) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* 印刷時の設定 */
        @media print {
            body { background-color: white; }
            .print\:hidden { display: none !important; }
            .print\:block { display: block !important; }
            .print\:p-0 { padding: 0 !important; }
            .print\:m-0 { margin: 0 !important; }
            .print\:shadow-none { box-shadow: none !important; }
            .print\:max-w-none { max-width: none !important; }
        }
        /* スクロールバーのカスタマイズ */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-gray-100">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Icons (Inline SVG) ---
        const PrinterIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="6 9 6 2 18 2 18 9"></polyline>
                <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                <rect x="6" y="14" width="12" height="8"></rect>
            </svg>
        );

        const RefreshIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 2v6h-6"></path>
                <path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path>
                <path d="M3 22v-6h6"></path>
                <path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path>
            </svg>
        );

        const EyeIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
        );

        const EyeOffIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
        );

        const BackIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        );

        // --- Helper Functions ---
        const formatTerm = (c, v, isFirst) => {
            if (c === 0) return '';
            let sign = '';
            if (c < 0) {
                sign = isFirst ? '-' : '- ';
            } else {
                sign = isFirst ? '' : '+ ';
            }
            let absC = Math.abs(c);
            let coef = (absC === 1 && v !== '') ? '' : absC;
            return `${sign}${coef}${v}`;
        };

        const gcd = (a, b) => b === 0 ? a : gcd(b, a % b);

        // --- Problem Generators ---
        const generateIntegers = (diff) => {
            if (diff === 'easy') {
                let a = Math.floor(Math.random() * 19) - 9;
                let b = Math.floor(Math.random() * 19) - 9;
                let op = Math.random() > 0.5 ? '+' : '-';
                return { q: `${a} ${op} ${b < 0 ? `(${b})` : b}`, a: `${op === '+' ? a + b : a - b}` };
            } else if (diff === 'normal') {
                let a = Math.floor(Math.random() * 19) - 9;
                let b = Math.floor(Math.random() * 19) - 9;
                if (b === 0) b = 1;
                let op = Math.random() > 0.5 ? '\\times' : '\\div';
                let ans;
                if (op === '\\times') ans = a * b;
                else { ans = a; a = a * b; }
                return { q: `${a} ${op} ${b < 0 ? `(${b})` : b}`, a: `${ans}` };
            } else {
                let a = Math.floor(Math.random() * 19) - 9;
                let b = Math.floor(Math.random() * 9) - 4; if (b===0) b=2;
                let c = Math.floor(Math.random() * 9) - 4; if (c===0) c=3;
                return { q: `${a} - ${b < 0 ? `(${b})` : b} \\times ${c < 0 ? `(${c})` : c}`, a: `${a - b * c}` };
            }
        };

        const generateAlgebraic = (diff) => {
            if (diff === 'easy') {
                let a = Math.floor(Math.random() * 9) - 4; if(a===0) a=1;
                let b = Math.floor(Math.random() * 9) - 4; if(b===0) b=2;
                return { q: `${formatTerm(a, 'x', true)} ${formatTerm(b, 'x', false)}`, a: `${formatTerm(a+b, 'x', true) || '0'}` };
            } else if (diff === 'normal') {
                let a = Math.floor(Math.random() * 5) + 2;
                let b = Math.floor(Math.random() * 5) + 1;
                let c = Math.floor(Math.random() * 5) + 1;
                let d = Math.floor(Math.random() * 5) + 2;
                return { q: `${a}(x - ${b}) - ${c}(x - ${d})`, a: `${formatTerm(a-c, 'x', true)} ${formatTerm(-a*b + c*d, '', false)}` || '0' };
            } else {
                let a = Math.floor(Math.random() * 4) + 1;
                let b = Math.floor(Math.random() * 5) + 1;
                let d = Math.floor(Math.random() * 4) + 1;
                let e = Math.floor(Math.random() * 5) + 1;
                let ansX = a * 3 - d * 2;
                let ansC = -b * 3 - (-e) * 2;
                return { 
                    q: `\\frac{${formatTerm(a,'x',true)} - ${b}}{2} - \\frac{${formatTerm(d,'x',true)} - ${e}}{3}`, 
                    a: `\\frac{${formatTerm(ansX,'x',true)} ${formatTerm(ansC,'',false)}}{6}`
                };
            }
        };

        const generateLinearEquations = (diff) => {
            if (diff === 'easy') {
                let x = Math.floor(Math.random() * 19) - 9;
                let a = Math.floor(Math.random() * 19) - 9;
                let b = x + a;
                if (Math.random() > 0.5) return { q: `x ${formatTerm(a, '', false)} = ${b}`, a: `x = ${x}` };
                let c = Math.floor(Math.random() * 9) - 4; if (c===0) c=2;
                return { q: `${c}x = ${c * x}`, a: `x = ${x}` };
            } else if (diff === 'normal') {
                let x = Math.floor(Math.random() * 19) - 9;
                let a = Math.floor(Math.random() * 9) - 4; if (a===0) a=2;
                let c = Math.floor(Math.random() * 9) - 4; if (c===a) c=a-1;
                let b = Math.floor(Math.random() * 19) - 9;
                let d = a * x + b - c * x;
                return { q: `${formatTerm(a,'x',true)} ${formatTerm(b,'',false)} = ${formatTerm(c,'x',true)} ${formatTerm(d,'',false)}`, a: `x = ${x}` };
            } else {
                let x = Math.floor(Math.random() * 11) - 5;
                let a = Math.floor(Math.random() * 5) + 2;
                let b = Math.floor(Math.random() * 9) - 4;
                let c = Math.floor(Math.random() * 5) + 1;
                let d = a * (x + b) - c * x;
                return { q: `${a}(x ${formatTerm(b,'',false)}) = ${formatTerm(c,'x',true)} ${formatTerm(d,'',false)}`, a: `x = ${x}` };
            }
        };

        const generateProportions = (diff) => {
            if (diff === 'easy') {
                let a = Math.floor(Math.random() * 9) - 4; if (a===0) a=3;
                let x = Math.floor(Math.random() * 5) + 2;
                return { q: `yはxに比例し、x=${x}のときy=${a*x}である。yをxの式で表しなさい。`, a: `y = ${formatTerm(a,'x',true)}` };
            } else if (diff === 'normal') {
                let a = Math.floor(Math.random() * 8) + 2;
                let x = Math.floor(Math.random() * 6) + 2;
                if (Math.random() > 0.5) {
                    return { q: `yはxに反比例し、x=${x}のときy=${a}である。yをxの式で表しなさい。`, a: `y = \\frac{${a*x}}{x}` };
                } else {
                    return { q: `yはxに反比例し、x=${x}のときy=${-a}である。yをxの式で表しなさい。`, a: `y = -\\frac{${a*x}}{x}` };
                }
            } else {
                let a = Math.floor(Math.random() * 9) - 4; if (a===0) a=5;
                let x = Math.floor(Math.random() * 3) + 2;
                let y = a * x;
                let q_x = Math.floor(Math.random() * 5) - 6; if (q_x===0) q_x=-3;
                return { q: `yはxに比例し、x=${x}のときy=${y}である。x=${q_x}のときのyの値を求めなさい。`, a: `y = ${a * q_x}` };
            }
        };

        const generateDataAnalysis = (diff) => {
            const types = diff === 'easy' ? ['median_odd', 'mean'] : diff === 'normal' ? ['median_even', 'mean'] : ['range', 'mean_reverse'];
            const type = types[Math.floor(Math.random() * types.length)];
            
            if (type === 'median_odd') {
                let d = Array.from({length: 5}, () => Math.floor(Math.random() * 30) + 1);
                let sorted = [...d].sort((a,b) => a-b);
                return { q: `次のデータの中央値(メジアン)を求めなさい。 ${d.join(', ')}`, a: `${sorted[2]}` };
            } else if (type === 'median_even') {
                let d = Array.from({length: 6}, () => Math.floor(Math.random() * 30) + 1);
                let sorted = [...d].sort((a,b) => a-b);
                return { q: `次のデータの中央値を求めなさい。 ${d.join(', ')}`, a: `${(sorted[2] + sorted[3]) / 2}` };
            } else if (type === 'range') {
                let d = Array.from({length: 5}, () => Math.floor(Math.random() * 40) + 1);
                return { q: `次のデータの範囲(レンジ)を求めなさい。 ${d.join(', ')}`, a: `${Math.max(...d) - Math.min(...d)}` };
            } else if (type === 'mean') {
                const mean = Math.floor(Math.random() * 10) + 5;
                let sum = 0;
                let d = [];
                for (let i=0; i<4; i++) {
                    let n = mean + Math.floor(Math.random() * 9) - 4;
                    if (n < 1) n = 1;
                    d.push(n);
                    sum += n;
                }
                d.push(mean * 5 - sum);
                d.sort(() => Math.random() - 0.5);
                return { q: `次のデータの平均値を求めなさい。 ${d.join(', ')}`, a: `${mean}` };
            } else if (type === 'mean_reverse') {
                const mean = Math.floor(Math.random() * 10) + 10;
                let sum = 0;
                let d = [];
                for (let i=0; i<4; i++) {
                    let n = mean + Math.floor(Math.random() * 9) - 4;
                    d.push(n);
                    sum += n;
                }
                const target = mean * 5 - sum;
                return { q: `5つのデータ ${d.join(', ')}, x の平均値が ${mean} のとき、xの値を求めなさい。`, a: `x = ${target}` };
            }
        };

        const generatePolynomials = (diff) => {
            if (diff === 'easy') {
                let a = Math.floor(Math.random() * 5) + 1;
                let b = Math.floor(Math.random() * 5) + 1;
                let c = Math.floor(Math.random() * 5) + 1;
                let d = Math.floor(Math.random() * 5) + 1;
                return { q: `(${a}x - ${b}y) + (${c}x + ${d}y)`, a: `${formatTerm(a+c, 'x', true)} ${formatTerm(-b+d, 'y', false)}` };
            } else if (diff === 'normal') {
                let a = Math.floor(Math.random() * 4) + 2;
                let b = Math.floor(Math.random() * 4) + 2;
                let c = Math.floor(Math.random() * 4) + 2;
                return { q: `${a*c}x^2y \\times ${b}x \\div ${c}y`, a: `${a*b}x^3` };
            } else {
                let a = Math.floor(Math.random() * 3) + 2;
                let b = Math.floor(Math.random() * 3) + 2;
                return { q: `(-${a}xy)^2 \\times ${b}x \\div ${a}x^2y`, a: `${a*b}xy` };
            }
        };

        const generateSimultaneous = (diff) => {
            let x = Math.floor(Math.random() * 9) - 4;
            let y = Math.floor(Math.random() * 9) - 4;
            if (diff === 'easy') {
                let a = Math.floor(Math.random() * 3) + 2;
                let b = x - a * y;
                let c = x + y;
                return { q: `\\begin{cases} x = ${a}y ${formatTerm(b,'',false)} \\\\ x + y = ${c} \\end{cases}`, a: `x = ${x}, y = ${y}` };
            } else if (diff === 'normal') {
                let a = Math.floor(Math.random() * 3) + 2;
                let b = Math.floor(Math.random() * 3) + 1;
                let d = Math.floor(Math.random() * 3) + 1;
                let c1 = a*x + b*y;
                let c2 = a*x - d*y;
                return { q: `\\begin{cases} ${a}x + ${b}y = ${c1} \\\\ ${a}x - ${d}y = ${c2} \\end{cases}`, a: `x = ${x}, y = ${y}` };
            } else {
                let a = 2, b = 3, d = 3, e = -2;
                let c1 = a*x + b*y;
                let c2 = d*x + e*y;
                return { q: `\\begin{cases} ${a}x + ${b}y = ${c1} \\\\ ${d}x - ${Math.abs(e)}y = ${c2} \\end{cases}`, a: `x = ${x}, y = ${y}` };
            }
        };

        const generateLinearFunctions = (diff) => {
            if (diff === 'easy') {
                let a = Math.floor(Math.random() * 5) + 2;
                let x = Math.floor(Math.random() * 5) + 1;
                let y = Math.floor(Math.random() * 9) - 4;
                let b = y - a * x;
                return { q: `変化の割合が ${a} で、点(${x}, ${y})を通る直線の式を求めなさい。`, a: `y = ${a}x ${formatTerm(b,'',false)}` };
            } else if (diff === 'normal') {
                let a = Math.floor(Math.random() * 5) - 2; if (a===0) a=2;
                let x1 = Math.floor(Math.random() * 5) + 1;
                let x2 = x1 + 2;
                let b = Math.floor(Math.random() * 9) - 4;
                return { q: `2点 (${x1}, ${a*x1+b}), (${x2}, ${a*x2+b}) を通る直線の式を求めなさい。`, a: `y = ${formatTerm(a,'x',true)} ${formatTerm(b,'',false)}` };
            } else {
                let a = Math.floor(Math.random() * 5) + 2;
                if (Math.random() > 0.5) a = -a;
                let b = Math.floor(Math.random() * 9) - 4;
                return { q: `直線 y = ${a}x - 5 に平行で、点(2, ${a*2+b})を通る直線の式を求めなさい。`, a: `y = ${a}x ${formatTerm(b,'',false)}` };
            }
        };

        const generateProbabilities = (diff) => {
            if (diff === 'easy') {
                const targets = [
                    { text: '偶数', num: 3, den: 6 },
                    { text: '奇数', num: 3, den: 6 },
                    { text: '3以上', num: 4, den: 6 },
                    { text: '4以下', num: 4, den: 6 },
                    { text: '素数', num: 3, den: 6 },
                    { text: '6の約数', num: 4, den: 6 },
                    { text: '3の倍数', num: 2, den: 6 },
                    { text: '5以上', num: 2, den: 6 }
                ];
                const t = targets[Math.floor(Math.random() * targets.length)];
                const g = gcd(t.num, t.den);
                const aStr = t.den/g === 1 ? `${t.num/g}` : `\\frac{${t.num/g}}{${t.den/g}}`;
                return {
                    q: `1つのさいころを投げるとき、${t.text}の目が出る確率を求めなさい。`,
                    a: aStr
                };
            } else if (diff === 'normal') {
                const type = Math.floor(Math.random() * 3);
                if (type === 0) {
                    let t = Math.floor(Math.random() * 9) + 3; // 3 to 11
                    let ways = 0;
                    for(let i=1; i<=6; i++) for(let j=1; j<=6; j++) if(i+j === t) ways++;
                    const g = gcd(ways, 36);
                    return { q: `2つのさいころを同時に投げるとき、出る目の和が${t}になる確率を求めなさい。`, a: `\\frac{${ways/g}}{${36/g}}` };
                } else if (type === 1) {
                    const targets = [
                        { text: '2枚とも表', num: 1, den: 4 },
                        { text: '2枚とも裏', num: 1, den: 4 },
                        { text: '1枚が表で1枚が裏', num: 2, den: 4 }
                    ];
                    const t = targets[Math.floor(Math.random() * targets.length)];
                    const g = gcd(t.num, t.den);
                    return { q: `2枚の硬貨を同時に投げるとき、${t.text}になる確率を求めなさい。`, a: `\\frac{${t.num/g}}{${t.den/g}}` };
                } else {
                    const total = Math.floor(Math.random() * 6) + 5; // 5 to 10
                    const hits = Math.floor(Math.random() * 3) + 2; // 2 to 4
                    const g = gcd(hits, total);
                    return { q: `${total}本のくじの中に${hits}本の当たりくじが入っている。このくじを1本ひくとき、当たる確率を求めなさい。`, a: `\\frac{${hits/g}}{${total/g}}` };
                }
            } else {
                const type = Math.floor(Math.random() * 2);
                if (type === 0) {
                    const targets = [
                        { text: '3枚とも表', num: 1, den: 8 },
                        { text: '3枚とも裏', num: 1, den: 8 },
                        { text: '2枚が表で1枚が裏', num: 3, den: 8 },
                        { text: '少なくとも1枚は表', num: 7, den: 8 }
                    ];
                    const t = targets[Math.floor(Math.random() * targets.length)];
                    const g = gcd(t.num, t.den);
                    return { q: `3枚の硬貨を同時に投げるとき、${t.text}になる確率を求めなさい。`, a: `\\frac{${t.num/g}}{${t.den/g}}` };
                } else {
                    const red = Math.floor(Math.random() * 3) + 2; // 2-4
                    const white = Math.floor(Math.random() * 3) + 2; // 2-4
                    const total = red + white;
                    const totalWays = (total * (total - 1)) / 2;
                    const redWays = (red * (red - 1)) / 2;
                    const diffWays = red * white;
                    const isRed = Math.random() > 0.5;
                    const ways = isRed ? redWays : diffWays;
                    const text = isRed ? '2個とも赤玉' : '赤玉と白玉が1個ずつ';
                    const g = gcd(ways, totalWays);
                    return { q: `赤玉${red}個と白玉${white}個が入った袋から、同時に2個の玉を取り出すとき、${text}になる確率を求めなさい。`, a: `\\frac{${ways/g}}{${totalWays/g}}` };
                }
            }
        };

        const generateExpansions = (diff) => {
            if (diff === 'easy') {
                let a = Math.floor(Math.random() * 9) - 4; if (a===0) a=2;
                let b = Math.floor(Math.random() * 9) - 4; if (b===0) b=3;
                return { q: `(x ${formatTerm(a,'',false)})(x ${formatTerm(b,'',false)})`, a: `x^2 ${formatTerm(a+b,'x',false)} ${formatTerm(a*b,'',false)}` };
            } else if (diff === 'normal') {
                let a = Math.floor(Math.random() * 9) - 4; if (a===0) a=5;
                if (Math.random() > 0.5) return { q: `(x ${formatTerm(a,'',false)})^2`, a: `x^2 ${formatTerm(2*a,'x',false)} + ${a*a}` };
                return { q: `(x ${formatTerm(a,'',false)})(x ${formatTerm(-a,'',false)})`, a: `x^2 - ${a*a}` };
            } else {
                let a = Math.floor(Math.random() * 3) + 2;
                let b = Math.floor(Math.random() * 5) + 1;
                let c = Math.floor(Math.random() * 3) + 2;
                let d = Math.floor(Math.random() * 5) + 1;
                return { q: `(${a}x + ${b})(${c}x - ${d})`, a: `${a*c}x^2 ${formatTerm(-a*d + b*c,'x',false)} - ${b*d}` };
            }
        };

        const generateFactorizations = (diff) => {
            if (diff === 'easy') {
                let a = Math.floor(Math.random() * 4) + 2;
                let b = Math.floor(Math.random() * 4) + 2;
                return { q: `${a}x^2 + ${a*b}x`, a: `${a}x(x + ${b})` };
            } else if (diff === 'normal') {
                let a = Math.floor(Math.random() * 9) - 4; if(a===0) a=2;
                let b = Math.floor(Math.random() * 9) - 4; if(b===0) b=-3;
                return { q: `x^2 ${formatTerm(a+b,'x',false)} ${formatTerm(a*b,'',false)}`, a: `(x ${formatTerm(a,'',false)})(x ${formatTerm(b,'',false)})` };
            } else {
                let a = Math.floor(Math.random() * 5) + 2;
                let b = Math.floor(Math.random() * 5) + 2;
                if (Math.random() > 0.5) return { q: `${a}x^2 - ${a*b*b}y^2`, a: `${a}(x + ${b}y)(x - ${b}y)` };
                return { q: `x^2 - ${a*a}y^2`, a: `(x + ${a}y)(x - ${a}y)` };
            }
        };

        const generateSquareRoots = (diff) => {
            const primes = [2, 3, 5, 7];
            let p = primes[Math.floor(Math.random() * primes.length)];
            if (diff === 'easy') {
                let a = Math.floor(Math.random() * 4) + 2;
                let b = Math.floor(Math.random() * 4) + 2;
                if (Math.random() > 0.5) b = -b;
                return { q: `${a}\\sqrt{${p}} ${formatTerm(b,'\\sqrt{'+p+'}',false)}`, a: `${a+b}\\sqrt{${p}}` };
            } else if (diff === 'normal') {
                let p2 = primes[Math.floor(Math.random() * primes.length)];
                if (p === p2) p2 = primes.find(x => x !== p);
                return { q: `\\sqrt{${p}} \\times \\sqrt{${p*p2}}`, a: `${p}\\sqrt{${p2}}` };
            } else {
                let p2 = primes[Math.floor(Math.random() * primes.length)];
                if (p === p2) p2 = primes.find(x => x !== p);
                return { q: `(\\sqrt{${p}} + \\sqrt{${p2}})^2`, a: `${p+p2} + 2\\sqrt{${p*p2}}` };
            }
        };

        const generateQuadratic = (diff) => {
            if (diff === 'easy') {
                let a = Math.floor(Math.random() * 9) - 4; if (a===0) a=2;
                let b = Math.floor(Math.random() * 9) - 4; if (b===0) b=-3;
                return { q: `(x ${formatTerm(-a,'',false)})(x ${formatTerm(-b,'',false)}) = 0`, a: `x = ${Math.min(a,b)}, ${Math.max(a,b)}` };
            } else if (diff === 'normal') {
                let a = Math.floor(Math.random() * 9) - 4; if (a===0) a=4;
                let b = Math.floor(Math.random() * 9) - 4; if (b===0) b=-2;
                return { q: `x^2 ${formatTerm(-(a+b),'x',false)} ${formatTerm(a*b,'',false)} = 0`, a: `x = ${Math.min(a,b)}, ${Math.max(a,b)}` };
            } else {
                let b = Math.floor(Math.random() * 4) * 2 + 2; // 偶数 2, 4, 6, 8
                let c = Math.floor(Math.random() * 5) + 1;
                let inside = (b/2)*(b/2) + c; 
                return { q: `x^2 + ${b}x - ${c} = 0`, a: `x = -${b/2} \\pm \\sqrt{${inside}}` };
            }
        };

        const generators = {
            integers: generateIntegers,
            algebraic_expressions: generateAlgebraic,
            linear_equations: generateLinearEquations,
            proportions: generateProportions,
            data_analysis: generateDataAnalysis,
            polynomial_calculations: generatePolynomials,
            simultaneous_equations: generateSimultaneous,
            linear_functions: generateLinearFunctions,
            probabilities: generateProbabilities,
            expansions: generateExpansions,
            factorizations: generateFactorizations,
            square_roots: generateSquareRoots,
            quadratic_equations: generateQuadratic,
        };

        // --- Math Renderer ---
        const renderContent = (str) => {
            if (!str) return null;
            
            // 連立方程式
            if (str.includes('\\begin{cases}')) {
                const parts = str.match(/\\begin\{cases\}\s*(.*?)\s*\\\\\s*(.*?)\s*\\end\{cases\}/);
                if (parts) {
                    return (
                        <div className="flex items-center">
                            <div className="text-4xl sm:text-5xl font-light text-gray-800 mr-2 sm:mr-3 mt-1 leading-none">{'{'}</div>
                            <div className="flex flex-col gap-1 sm:gap-2 text-lg sm:text-xl font-serif tracking-widest">
                                <div>{renderContent(parts[1])}</div>
                                <div>{renderContent(parts[2])}</div>
                            </div>
                        </div>
                    );
                }
            }

            // 記号置換
            let processedStr = str.replace(/\\times/g, '×').replace(/\\div/g, '÷').replace(/\\pm/g, '±');

            // 分数とルートのパース
            const tokens = processedStr.split(/(\\frac{[^{}]+}{[^{}]+}|\\sqrt{[^{}]+})/g);
            
            return (
                <span className="inline-flex items-center flex-wrap leading-loose">
                    {tokens.map((token, i) => {
                        if (token.startsWith('\\frac')) {
                            const match = /\\frac{([^{}]+)}{([^{}]+)}/.exec(token);
                            if (match) {
                                return (
                                    <span key={i} className="inline-flex flex-col items-center justify-center align-middle mx-1.5 -translate-y-1">
                                        <span className="border-b border-gray-800 px-1 text-[0.8em] leading-none pb-0.5">{renderSimpleMath(match[1])}</span>
                                        <span className="text-[0.8em] leading-none pt-0.5">{renderSimpleMath(match[2])}</span>
                                    </span>
                                );
                            }
                        } else if (token.startsWith('\\sqrt')) {
                            const match = /\\sqrt{([^{}]+)}/.exec(token);
                            if (match) {
                                return (
                                    <span key={i} className="whitespace-nowrap inline-flex items-center mx-0.5">
                                        <span className="text-[1.1em] leading-none -mr-[1px] translate-y-[2px]">&radic;</span>
                                        <span className="border-t border-gray-800 pt-[1px] leading-none tracking-normal pr-0.5">{renderSimpleMath(match[1])}</span>
                                    </span>
                                );
                            }
                        }
                        return <span key={i} className="inline-block leading-relaxed">{renderSimpleMath(token)}</span>;
                    })}
                </span>
            );
        };

        const renderSimpleMath = (str) => {
            const parts = str.split('^2');
            if (parts.length === 1) return str;
            return (
                <React.Fragment>
                    {parts.map((part, i) => (
                        <React.Fragment key={i}>
                            {part}
                            {i < parts.length - 1 && <sup className="text-[0.7em] align-super font-serif">2</sup>}
                        </React.Fragment>
                    ))}
                </React.Fragment>
            );
        };

        // --- Main App ---
        function App() {
            const [selectedUnits, setSelectedUnits] = useState(['integers', 'linear_equations', 'simultaneous_equations', 'expansions']);
            const [count, setCount] = useState(10);
            const [difficulty, setDifficulty] = useState('normal');
            const [problems, setProblems] = useState([]);
            const [showAnswers, setShowAnswers] = useState(false);
            const [error, setError] = useState('');

            const unitsGrouped = [
                {
                    grade: '中学1年',
                    items: [
                        { id: 'integers', name: '正負の数の計算' },
                        { id: 'algebraic_expressions', name: '文字式の計算' },
                        { id: 'linear_equations', name: '1次方程式' },
                        { id: 'proportions', name: '比例・反比例' },
                        { id: 'data_analysis', name: 'データの活用' },
                    ]
                },
                {
                    grade: '中学2年',
                    items: [
                        { id: 'polynomial_calculations', name: '式の計算 (乗除)' },
                        { id: 'simultaneous_equations', name: '連立方程式' },
                        { id: 'linear_functions', name: '1次関数' },
                        { id: 'probabilities', name: '確率' },
                    ]
                },
                {
                    grade: '中学3年',
                    items: [
                        { id: 'expansions', name: '式の展開' },
                        { id: 'factorizations', name: '因数分解' },
                        { id: 'square_roots', name: '平方根の計算' },
                        { id: 'quadratic_equations', name: '2次方程式' },
                    ]
                }
            ];

            const toggleUnit = (unitId) => {
                setSelectedUnits(prev => {
                    if (prev.includes(unitId)) return prev.filter(id => id !== unitId);
                    return [...prev, unitId];
                });
            };

            const toggleAll = () => {
                const allIds = unitsGrouped.flatMap(g => g.items.map(i => i.id));
                if (selectedUnits.length === allIds.length) {
                    setSelectedUnits([]);
                } else {
                    setSelectedUnits(allIds);
                }
            };

            const generate = () => {
                if (selectedUnits.length === 0) {
                    setError('1つ以上の単元を選択してください。');
                    setProblems([]);
                    return;
                }
                setError('');

                const newProblems = [];
                let attempts = 0;
                const maxAttempts = count * 20; // 無限ループ防止用

                while (newProblems.length < count && attempts < maxAttempts) {
                    const randomUnitId = selectedUnits[Math.floor(Math.random() * selectedUnits.length)];
                    const newProblem = generators[randomUnitId](difficulty);
                    
                    // 重複チェック: まだ同じ問題文が追加されていなければ追加する
                    const isDuplicate = newProblems.some(p => p.q === newProblem.q);
                    if (!isDuplicate) {
                        newProblems.push(newProblem);
                    }
                    attempts++;
                }

                // 万が一バリエーションが枯渇し問題数が不足する場合は、重複を許可して補充
                while (newProblems.length < count) {
                    const randomUnitId = selectedUnits[Math.floor(Math.random() * selectedUnits.length)];
                    newProblems.push(generators[randomUnitId](difficulty));
                }

                setProblems(newProblems);
                setShowAnswers(false);
            };

            // 初期化および設定変更時に問題を自動生成
            useEffect(() => {
                if (selectedUnits.length > 0) {
                    generate();
                } else {
                    setProblems([]);
                    setError('1つ以上の単元を選択してください。');
                }
            }, [selectedUnits, count, difficulty]);

            const print = () => window.print();

            const getTestTitle = () => {
                if (selectedUnits.length === 1) {
                    const allItems = unitsGrouped.flatMap(g => g.items);
                    return allItems.find(u => u.id === selectedUnits[0])?.name + ' 小テスト';
                }
                return '数学 総合復習プリント';
            };

            return (
                <div className="min-h-screen bg-gray-100 p-4 sm:p-6 lg:p-8 font-sans text-gray-900 print:bg-white print:p-0">
                    <div className="max-w-[1400px] mx-auto flex flex-col lg:flex-row gap-6 lg:gap-8 print:block print:max-w-none print:mx-0">
                        
                        {/* 左側コントロールパネル (印刷時非表示) */}
                        <div className="w-full lg:w-[320px] shrink-0 print:hidden">
                            <div className="bg-white p-5 sm:p-6 rounded-xl shadow-md lg:sticky lg:top-8 lg:max-h-[calc(100vh-4rem)] overflow-y-auto flex flex-col gap-6 custom-scrollbar">
                                <div>
                                    <h1 className="text-xl font-bold text-gray-800 mb-1">小テスト作成ツール</h1>
                                    <p className="text-xs text-gray-500 leading-relaxed">設定を変更すると、右側のプリントにリアルタイムで問題が自動生成されます。</p>
                                </div>

                                {/* 単元選択 */}
                                <div>
                                    <div className="flex justify-between items-end mb-2">
                                        <label className="block text-sm font-bold text-gray-700">出題単元</label>
                                        <button onClick={toggleAll} className="text-xs text-blue-600 hover:text-blue-800 font-medium">
                                            {selectedUnits.length >= 10 ? 'すべて解除' : 'すべて選択'}
                                        </button>
                                    </div>
                                    
                                    <div className="space-y-3">
                                        {unitsGrouped.map((group, idx) => (
                                            <div key={idx} className="bg-gray-50 p-3 rounded-lg border border-gray-200">
                                                <h3 className="text-xs font-bold text-gray-500 mb-2 border-b pb-1">{group.grade}</h3>
                                                <div className="flex flex-col gap-1">
                                                    {group.items.map(u => (
                                                        <label key={u.id} className="flex items-center p-1.5 rounded hover:bg-gray-200 cursor-pointer transition-colors">
                                                            <input 
                                                                type="checkbox" 
                                                                className="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
                                                                checked={selectedUnits.includes(u.id)}
                                                                onChange={() => toggleUnit(u.id)}
                                                            />
                                                            <span className="ml-2 text-sm text-gray-700 font-medium">{u.name}</span>
                                                        </label>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    {error && <p className="text-red-500 text-xs mt-2 font-bold">{error}</p>}
                                </div>

                                {/* 難易度と問題数 */}
                                <div className="space-y-4 border-t pt-4 border-gray-100">
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">難易度</label>
                                        <select 
                                            value={difficulty} 
                                            onChange={(e) => setDifficulty(e.target.value)}
                                            className="w-full bg-gray-50 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 p-2.5 outline-none transition-shadow text-sm font-medium"
                                        >
                                            <option value="easy">基本 (ウォーミングアップ)</option>
                                            <option value="normal">標準 (定期テストレベル)</option>
                                            <option value="hard">応用 (入試基礎レベル)</option>
                                        </select>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">問題数</label>
                                        <select 
                                            value={count} 
                                            onChange={(e) => setCount(Number(e.target.value))}
                                            className="w-full bg-gray-50 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 p-2.5 outline-none transition-shadow text-sm font-medium"
                                        >
                                            <option value={5}>5問</option>
                                            <option value={10}>10問 (約10分)</option>
                                            <option value={15}>15問</option>
                                            <option value={20}>20問</option>
                                        </select>
                                    </div>
                                </div>

                                {/* アクションボタン */}
                                <div className="space-y-2.5 border-t pt-4 border-gray-100">
                                    <button 
                                        onClick={generate}
                                        disabled={selectedUnits.length === 0}
                                        className="w-full flex items-center justify-center gap-1.5 bg-blue-50 hover:bg-blue-100 text-blue-700 font-medium py-2.5 px-4 rounded-lg transition-colors text-sm border border-blue-200 disabled:opacity-50 disabled:cursor-not-allowed"
                                    >
                                        <RefreshIcon />
                                        別の問題を生成
                                    </button>

                                    <button 
                                        onClick={() => setShowAnswers(!showAnswers)}
                                        disabled={selectedUnits.length === 0}
                                        className="w-full flex items-center justify-center gap-1.5 bg-gray-50 hover:bg-gray-100 text-gray-700 font-medium py-2.5 px-4 rounded-lg transition-colors text-sm border border-gray-200 disabled:opacity-50 disabled:cursor-not-allowed"
                                    >
                                        {showAnswers ? <EyeOffIcon /> : <EyeIcon />}
                                        {showAnswers ? '解答を隠す' : '解答を表示'}
                                    </button>

                                    <button 
                                        onClick={print}
                                        disabled={selectedUnits.length === 0}
                                        className="w-full flex items-center justify-center gap-1.5 bg-gray-800 hover:bg-gray-900 text-white font-medium py-2.5 px-4 rounded-lg transition-colors text-sm shadow-sm disabled:opacity-50 disabled:cursor-not-allowed"
                                    >
                                        <PrinterIcon />
                                        プリントを印刷
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* 右側 プリントプレビュー */}
                        <div className="flex-1 flex justify-center print:block">
                            <div className="w-full max-w-4xl bg-white p-8 sm:p-12 md:p-16 rounded-xl shadow-md print:shadow-none print:p-0 min-h-[297mm]">
                                
                                <div className="flex flex-col sm:flex-row sm:justify-between sm:items-end border-b-2 border-gray-800 pb-4 mb-8 sm:mb-10 gap-4">
                                    <h2 className="text-xl sm:text-2xl md:text-3xl font-bold text-gray-900 tracking-tight">
                                        {getTestTitle()}
                                    </h2>
                                    <div className="flex gap-3 sm:gap-4 text-sm sm:text-base font-medium text-gray-800 shrink-0">
                                        <div className="border-b border-gray-400 w-12 sm:w-16 text-center pb-1">　年</div>
                                        <div className="border-b border-gray-400 w-12 sm:w-16 text-center pb-1">　組</div>
                                        <div className="border-b border-gray-400 w-12 sm:w-16 text-center pb-1">　番</div>
                                        <div className="border-b border-gray-400 w-24 sm:w-40 pb-1">氏名</div>
                                    </div>
                                </div>

                                {problems.length > 0 ? (
                                    <div className="grid gap-x-8 sm:gap-x-12 md:gap-x-16 gap-y-8 sm:gap-y-12 grid-cols-1 md:grid-cols-2">
                                        {problems.map((p, i) => (
                                            <div key={i} className="flex gap-3 sm:gap-4 break-inside-avoid">
                                                <div className="font-bold text-lg sm:text-xl text-gray-800 w-6 sm:w-8 shrink-0 mt-0.5">({i + 1})</div>
                                                <div className="flex flex-col gap-4 sm:gap-6 w-full">
                                                    <div className="min-h-[2.5rem] flex items-center text-gray-900 text-base sm:text-lg">
                                                        {renderContent(p.q)}
                                                    </div>
                                                    
                                                    {showAnswers ? (
                                                        <div className="text-red-600 font-bold border-b-2 border-red-200 pb-2 pl-2 text-base sm:text-lg mt-auto">
                                                            答. {renderContent(p.a)}
                                                        </div>
                                                    ) : (
                                                        <div className="border-b border-dashed border-gray-400 pb-2 h-6 sm:h-8 w-full mt-auto"></div>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="flex items-center justify-center h-64 text-gray-400 text-lg">
                                        {error ? '左のパネルから単元を選択してください。' : '問題を生成しています...'}
                                    </div>
                                )}
                                
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        // Reactアプリのレンダリング
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
