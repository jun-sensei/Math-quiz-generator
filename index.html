<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中学校 数学 小テスト作成ツール (拡張版)</title>
    
    <!-- Tailwind CSS (スタイリング用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel (ブラウザ上でReactコードを変換するため) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* 印刷時の設定 */
        @media print {
            body { background-color: white; }
            .print\:hidden { display: none !important; }
            .print\:block { display: block !important; }
            .print\:p-0 { padding: 0 !important; }
            .print\:m-0 { margin: 0 !important; }
            .print\:shadow-none { box-shadow: none !important; }
            .print\:max-w-none { max-width: none !important; }
        }
        /* スクロールバーのカスタマイズ */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-gray-100">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Icons (Inline SVG) ---
        const PrinterIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="6 9 6 2 18 2 18 9"></polyline>
                <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                <rect x="6" y="14" width="12" height="8"></rect>
            </svg>
        );

        const RefreshIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 2v6h-6"></path>
                <path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path>
                <path d="M3 22v-6h6"></path>
                <path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path>
            </svg>
        );

        const EyeIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
        );

        const EyeOffIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
        );

        // --- Utils ---
        const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        const nonZeroRand = (min, max) => { let r = 0; while (r === 0) r = rand(min, max); return r; };
        const choice = (arr) => arr[Math.floor(Math.random() * arr.length)];
        const gcd = (a, b) => b === 0 ? Math.abs(a) : gcd(b, a % b);
        const formatTerm = (c, v, isFirst) => {
            if (c === 0) return '';
            let sign = c < 0 ? (isFirst ? '-' : '- ') : (isFirst ? '' : '+ ');
            let absC = Math.abs(c);
            let coef = (absC === 1 && v !== '') ? '' : absC;
            return `${sign}${coef}${v}`;
        };
        const wrapP = (num) => num < 0 ? `(${num})` : `${num}`;

        // --- Problem Generators ---

        const generateIntegers = (diff) => {
            const type = rand(0, 2);
            if (diff === 'easy') {
                if (type === 0) { // 2項加減
                    let a = rand(-15, 15); let b = rand(-15, 15);
                    let op = choice(['+', '-']);
                    return { q: `${a} ${op} ${wrapP(b)}`, a: `${op === '+' ? a + b : a - b}` };
                } else if (type === 1) { // 小数1桁
                    let a = nonZeroRand(-9, 9) / 10; let b = nonZeroRand(-9, 9) / 10;
                    let ans = Math.round((a + b)*10)/10;
                    return { q: `${a} + ${b < 0 ? `(${b})` : b}`, a: `${ans}` };
                } else { // 2項乗除
                    let a = nonZeroRand(-9, 9); let b = nonZeroRand(-9, 9);
                    if (Math.random() > 0.5) return { q: `${a} \\times ${wrapP(b)}`, a: `${a * b}` };
                    let ans = a; a = a * b;
                    return { q: `${a} \\div ${wrapP(b)}`, a: `${ans}` };
                }
            } else if (diff === 'normal') {
                if (type === 0) { // 3項加減
                    let a = rand(-10, 10); let b = rand(-10, 10); let c = rand(-10, 10);
                    let op1 = choice(['+', '-']); let op2 = choice(['+', '-']);
                    let ans = (op1 === '+' ? a + b : a - b);
                    ans = (op2 === '+' ? ans + c : ans - c);
                    return { q: `${a} ${op1} ${wrapP(b)} ${op2} ${wrapP(c)}`, a: `${ans}` };
                } else if (type === 1) { // 乗除混合
                    let a = nonZeroRand(-5, 5); let b = nonZeroRand(-5, 5); let c = nonZeroRand(-5, 5);
                    let p = a * b * c;
                    return { q: `${p} \\div ${wrapP(a)} \\times ${wrapP(b)}`, a: `${b * b * c}` };
                } else { // 分数の加減(同分母)
                    let den = choice([3, 5, 7]); let num1 = nonZeroRand(-5, 5); let num2 = nonZeroRand(-5, 5);
                    let ansNum = num1 + num2; let g = gcd(ansNum, den);
                    let aStr = ansNum === 0 ? "0" : (den/g === 1 ? `${ansNum/g}` : `\\frac{${ansNum/g}}{${den/g}}`);
                    if(ansNum/g < 0 && den/g !== 1) aStr = `-\\frac{${Math.abs(ansNum/g)}}{${den/g}}`;
                    return { q: `\\frac{${num1}}{${den}} + ${num2 < 0 ? `(-\\frac{${-num2}}{${den}})` : `\\frac{${num2}}{${den}}`}`, a: aStr };
                }
            } else {
                if (type === 0) { // 四則混合
                    let a = nonZeroRand(-9, 9); let b = nonZeroRand(-5, 5); let c = nonZeroRand(-5, 5);
                    return { q: `${a} - ${wrapP(b)} \\times ${wrapP(c)}`, a: `${a - b * c}` };
                } else if (type === 1) { // 累乗を含む
                    let a = choice([-2, -3, 2, 3]); let b = nonZeroRand(-5, 5); let c = nonZeroRand(-10, 10);
                    return { q: `${a}^2 \\times ${wrapP(b)} + ${wrapP(c)}`, a: `${(a*a)*b + c}` };
                } else { // カッコつき
                    let a = nonZeroRand(-5, 5); let b = nonZeroRand(-5, 5); let c = nonZeroRand(-5, 5);
                    return { q: `${a} \\times (${b} - ${wrapP(c)})`, a: `${a * (b - c)}` };
                }
            }
        };

        const generateAlgebraic = (diff) => {
            const type = rand(0, 2);
            if (diff === 'easy') {
                if (type === 0) { // 単純同類項
                    let a = rand(2, 9); let b = rand(2, 9);
                    let op = choice(['+', '-']);
                    return { q: `${a}x ${op} ${b}x`, a: `${op === '+' ? a+b : a-b}x` };
                } else if (type === 1) { // 単項式 * 数
                    let a = nonZeroRand(-9, 9); let b = nonZeroRand(-5, 5);
                    return { q: `${a}a \\times ${wrapP(b)}`, a: `${a*b}a` };
                } else { // 1次式 + 1次式
                    let a = nonZeroRand(-5, 5); let b = nonZeroRand(-5, 5);
                    let c = nonZeroRand(-5, 5); let d = nonZeroRand(-5, 5);
                    return { q: `(${formatTerm(a,'x',true)} ${formatTerm(b,'',false)}) + (${formatTerm(c,'x',true)} ${formatTerm(d,'',false)})`, a: `${formatTerm(a+c,'x',true)} ${formatTerm(b+d,'',false)}` || '0' };
                }
            } else if (diff === 'normal') {
                if (type === 0) { // 括弧の展開
                    let a = nonZeroRand(-5, 5); let b = nonZeroRand(-5, 5); let c = nonZeroRand(-5, 5);
                    return { q: `${a}(${formatTerm(b,'x',true)} ${formatTerm(c,'',false)})`, a: `${formatTerm(a*b,'x',true)} ${formatTerm(a*c,'',false)}` };
                } else if (type === 1) { // 展開と加減
                    let a = nonZeroRand(2, 5); let b = nonZeroRand(2, 5);
                    return { q: `${a}(x - 2) + ${b}(2x + 1)`, a: `${formatTerm(a+2*b,'x',true)} ${formatTerm(-2*a+b,'',false)}` };
                } else { // 分数と乗法
                    let a = nonZeroRand(-5, 5); let b = nonZeroRand(-5, 5);
                    let den = choice([2, 3, 4]); let mul = den * nonZeroRand(2, 4);
                    return { q: `\\frac{${formatTerm(a,'x',true)} ${formatTerm(b,'',false)}}{${den}} \\times ${mul}`, a: `${formatTerm(a*(mul/den),'x',true)} ${formatTerm(b*(mul/den),'',false)}` };
                }
            } else {
                if (type === 0) { // 分数の通分加減
                    let den1 = choice([2, 3]); let den2 = choice([4, 5]);
                    let a = rand(1, 3); let b = nonZeroRand(-3, 3);
                    let c = rand(1, 3); let d = nonZeroRand(-3, 3);
                    let lcm = den1 * den2;
                    let ansX = a*den2 + c*den1; let ansC = b*den2 + d*den1;
                    return { q: `\\frac{${formatTerm(a,'x',true)} ${formatTerm(b,'',false)}}{${den1}} + \\frac{${formatTerm(c,'x',true)} ${formatTerm(d,'',false)}}{${den2}}`, a: `\\frac{${formatTerm(ansX,'x',true)} ${formatTerm(ansC,'',false)}}{${lcm}}` };
                } else { // 複雑な分配法則
                    let a = nonZeroRand(-4, 4); let b = nonZeroRand(-4, 4); let c = nonZeroRand(-4, 4);
                    let d = nonZeroRand(-4, 4); let e = nonZeroRand(-4, 4); let f = nonZeroRand(-4, 4);
                    return { q: `${a}(${formatTerm(b,'x',true)} ${formatTerm(c,'y',false)}) - ${d}(${formatTerm(e,'x',true)} ${formatTerm(f,'y',false)})`, a: `${formatTerm(a*b - d*e,'x',true)} ${formatTerm(a*c - d*f,'y',false)}` || '0' };
                }
            }
        };

        const generateLinearEquations = (diff) => {
            const type = rand(0, 2);
            if (diff === 'easy') {
                if (type === 0) { // x + a = b
                    let ans = rand(-10, 10); let a = rand(-10, 10);
                    return { q: `x ${formatTerm(a,'',false)} = ${ans + a}`, a: `x = ${ans}` };
                } else if (type === 1) { // ax = b
                    let ans = rand(-10, 10); let a = nonZeroRand(-6, 6);
                    return { q: `${a}x = ${a * ans}`, a: `x = ${ans}` };
                } else { // x/a = b
                    let ans = rand(-10, 10); let a = choice([2, 3, 4, 5]);
                    return { q: `\\frac{x}{${a}} = ${ans}`, a: `x = ${ans * a}` };
                }
            } else if (diff === 'normal') {
                if (type === 0) { // ax + b = c
                    let ans = rand(-8, 8); let a = nonZeroRand(-5, 5); let b = nonZeroRand(-10, 10);
                    return { q: `${formatTerm(a,'x',true)} ${formatTerm(b,'',false)} = ${a*ans + b}`, a: `x = ${ans}` };
                } else if (type === 1) { // ax = bx + c
                    let ans = rand(-8, 8); let a = nonZeroRand(-5, 5); let b = nonZeroRand(-5, 5);
                    if(a===b) a++;
                    return { q: `${formatTerm(a,'x',true)} = ${formatTerm(b,'x',true)} ${formatTerm((a-b)*ans,'',false)}`, a: `x = ${ans}` };
                } else { // ax + b = cx + d
                    let ans = rand(-8, 8); let a = nonZeroRand(-5, 5); let c = nonZeroRand(-5, 5);
                    if(a===c) c++;
                    let b = nonZeroRand(-10, 10); let d = a*ans + b - c*ans;
                    return { q: `${formatTerm(a,'x',true)} ${formatTerm(b,'',false)} = ${formatTerm(c,'x',true)} ${formatTerm(d,'',false)}`, a: `x = ${ans}` };
                }
            } else {
                if (type === 0) { // 括弧あり a(x+b) = cx + d
                    let ans = rand(-6, 6); let a = nonZeroRand(2, 5); let b = nonZeroRand(-5, 5);
                    let c = nonZeroRand(-4, 4); if(a===c) c--;
                    let d = a*(ans+b) - c*ans;
                    return { q: `${a}(x ${formatTerm(b,'',false)}) = ${formatTerm(c,'x',true)} ${formatTerm(d,'',false)}`, a: `x = ${ans}` };
                } else if (type === 1) { // 小数係数
                    let ans = rand(-9, 9); let a = nonZeroRand(1, 5); let c = nonZeroRand(1, 5); if(a===c) c++;
                    let b = nonZeroRand(-9, 9); let d = a*ans + b - c*ans;
                    return { q: `${a/10}x ${formatTerm(b/10,'',false)} = ${c/10}x ${formatTerm(d/10,'',false)}`, a: `x = ${ans}` };
                } else { // 分数係数 x/a + b = x/c
                    let ans = choice([6, 12, -6, -12, 24]);
                    let a = choice([2, 3]); let c = choice([4, 6]);
                    let b = (ans/c) - (ans/a);
                    return { q: `\\frac{x}{${a}} ${formatTerm(b,'',false)} = \\frac{x}{${c}}`, a: `x = ${ans}` };
                }
            }
        };

        const generateProportions = (diff) => {
            const type = rand(0, 2);
            if (diff === 'easy') {
                if (type === 0) {
                    let a = nonZeroRand(-6, 6); let x = rand(2, 6);
                    return { q: `yはxに比例し、x=${x}のときy=${a*x}である。比例定数を求めなさい。`, a: `${a}` };
                } else if (type === 1) {
                    let a = nonZeroRand(-6, 6); let x = rand(2, 6);
                    return { q: `yはxに比例し、x=${x}のときy=${a*x}である。yをxの式で表しなさい。`, a: `y = ${formatTerm(a,'x',true)}` };
                } else {
                    let a = nonZeroRand(2, 8); let x = rand(2, 6);
                    return { q: `yはxに反比例し、x=${x}のときy=${a}である。比例定数を求めなさい。`, a: `${a*x}` };
                }
            } else if (diff === 'normal') {
                if (type === 0) {
                    let a = nonZeroRand(-8, 8); let x = rand(2, 6);
                    return { q: `yはxに反比例し、x=${x}のときy=${a}である。yをxの式で表しなさい。`, a: `y = \\frac{${a*x}}{x}` };
                } else if (type === 1) {
                    let a = nonZeroRand(2, 5); let x1 = rand(2, 4); let x2 = rand(5, 8);
                    return { q: `yはxに比例し、x=${x1}のときy=${a*x1}である。x=${x2}のときのyの値を求めなさい。`, a: `y = ${a*x2}` };
                } else {
                    let p = choice([12, 24, 36]); let x1 = rand(2, 4); let y1 = p/x1; let x2 = choice([2,3,4,6]);
                    while(p % x2 !== 0 || x1 === x2) x2 = choice([2,3,4,6]);
                    return { q: `yはxに反比例し、x=${x1}のときy=${y1}である。x=${x2}のときのyの値を求めなさい。`, a: `y = ${p/x2}` };
                }
            } else {
                if (type === 0) {
                    let a = nonZeroRand(-5, -2); let minX = rand(1, 3); let maxX = rand(4, 6);
                    return { q: `関数 y = ${a}x について、xの変域が ${minX} \\leqq x \\leqq ${maxX} のときのyの変域を求めなさい。`, a: `${a*maxX} \\leqq y \\leqq ${a*minX}` };
                } else if (type === 1) {
                    let a = choice([12, 24, 36]); let minX = rand(2, 3); let maxX = rand(4, 6);
                    return { q: `関数 y = \\frac{${a}}{x} について、xの変域が ${minX} \\leqq x \\leqq ${maxX} のときのyの変域を求めなさい。`, a: `${a/maxX} \\leqq y \\leqq ${a/minX}` };
                } else {
                    let speed = rand(40, 80); let time = rand(10, 20);
                    return { q: `毎分${speed}mの速さで歩くと${time}分かかる道のりを、毎分x mの速さで走るとy分かかる。yをxの式で表しなさい。`, a: `y = \\frac{${speed*time}}{x}` };
                }
            }
        };

        const generateDataAnalysis = (diff) => {
            const type = rand(0, 2);
            if (diff === 'easy') {
                if (type === 0) { // 平均
                    let arr = Array.from({length: 5}, () => rand(10, 20));
                    let sum = arr.reduce((a,b)=>a+b, 0);
                    return { q: `次のデータの平均値を求めなさい。 ${arr.join(', ')}`, a: `${sum/5}` };
                } else if (type === 1) { // 奇数の中央値
                    let arr = Array.from({length: 5}, () => rand(1, 15)).sort((a,b)=>a-b);
                    return { q: `次のデータの中央値(メジアン)を求めなさい。 ${arr.join(', ')}`, a: `${arr[2]}` };
                } else { // 最頻値
                    let val = rand(5, 10);
                    let arr = [val, val, rand(1,4), rand(11,15), val].sort(() => Math.random() - 0.5);
                    return { q: `次のデータの最頻値(モード)を求めなさい。 ${arr.join(', ')}`, a: `${val}` };
                }
            } else if (diff === 'normal') {
                if (type === 0) { // 偶数の中央値
                    let arr = Array.from({length: 6}, () => rand(5, 25)).sort((a,b)=>a-b);
                    return { q: `次のデータの中央値を求めなさい。 ${arr.join(', ')}`, a: `${(arr[2]+arr[3])/2}` };
                } else if (type === 1) { // 範囲
                    let arr = Array.from({length: 6}, () => rand(10, 50));
                    return { q: `次のデータの範囲(レンジ)を求めなさい。 ${arr.join(', ')}`, a: `${Math.max(...arr) - Math.min(...arr)}` };
                } else { // 相対度数
                    let total = choice([20, 25, 40, 50]);
                    let freq = rand(2, 10);
                    return { q: `全体の度数が${total}、ある階級の度数が${freq}のとき、この階級の相対度数を求めなさい。`, a: `${freq/total}` };
                }
            } else {
                if (type === 0) { // 四分位数
                    let arr = Array.from({length: 7}, () => rand(5, 30)).sort((a,b)=>a-b);
                    return { q: `次のデータの第1四分位数と第3四分位数を求めなさい。 ${arr.join(', ')}`, a: `第1: ${arr[1]}, 第3: ${arr[5]}` };
                } else if (type === 1) { // 逆算平均
                    let arr = Array.from({length: 4}, () => rand(10, 20));
                    let mean = rand(12, 18);
                    let target = mean * 5 - arr.reduce((a,b)=>a+b, 0);
                    return { q: `5つのデータ ${arr.join(', ')}, x の平均値が${mean}のとき、xの値を求めなさい。`, a: `x = ${target}` };
                } else { // 四分位範囲
                    let arr = Array.from({length: 7}, () => rand(5, 30)).sort((a,b)=>a-b);
                    return { q: `次のデータの四分位範囲を求めなさい。 ${arr.join(', ')}`, a: `${arr[5] - arr[1]}` };
                }
            }
        };

        const generatePolynomials = (diff) => {
            const type = rand(0, 2);
            if (diff === 'easy') {
                if (type === 0) { // a * b
                    let a = nonZeroRand(-6, 6); let b = nonZeroRand(2, 5);
                    return { q: `${a}x \\times ${b}y`, a: `${a*b}xy` };
                } else if (type === 1) { // a / b
                    let a = nonZeroRand(-6, 6) * 2; let b = choice([2, -2]);
                    return { q: `${a}xy \\div ${wrapP(b)}x`, a: `${a/b}y` };
                } else { // 単項式累乗
                    let a = nonZeroRand(-4, 4);
                    return { q: `(${a}x)^2`, a: `${a*a}x^2` };
                }
            } else if (diff === 'normal') {
                if (type === 0) { // 乗除混合
                    let a = nonZeroRand(-4, 4); let b = nonZeroRand(2, 4); let c = nonZeroRand(2, 3);
                    return { q: `${a*b*c}x^2y \\div ${b}x \\times ${c}y`, a: `${a*c*c}xy^2` };
                } else if (type === 1) { // 分数割り算
                    let a = nonZeroRand(4, 12); let b = choice([2, 3, 4]);
                    return { q: `${a}x^2 \\div \\frac{${b}}{5}x`, a: `${(a*5)/b}x` };
                } else { // 多項式 / 単項式
                    let a = nonZeroRand(2, 5); let b = nonZeroRand(-5, 5); let c = nonZeroRand(2, 4);
                    return { q: `(${a*c}x^2 ${formatTerm(b*c,'xy',false)}) \\div ${c}x`, a: `${formatTerm(a,'x',true)} ${formatTerm(b,'y',false)}` };
                }
            } else {
                if (type === 0) { // 累乗まじり乗除
                    let a = choice([-2, -3, 2, 3]); let b = nonZeroRand(2, 5);
                    return { q: `(${a}x)^2 \\times ${b}y \\div ${a*2}x`, a: `${(a*a*b)/(a*2)}xy` };
                } else if (type === 1) { // 複雑な分数
                    let a = nonZeroRand(2, 5); let b = nonZeroRand(-5, -2);
                    return { q: `\\frac{${a}x^2 y}{3} \\div \\frac{x}{6} \\times ${wrapP(b)}y`, a: `${a*2*b}xy^2` };
                } else { // 文字多め
                    let a = nonZeroRand(-5, 5); let b = nonZeroRand(2, 5); let c = nonZeroRand(2, 5);
                    return { q: `${a*b*c}a^2b^2 \\div ${wrapP(-b)}ab \\div ${c}b`, a: `${-a}a` };
                }
            }
        };

        const generateSimultaneous = (diff) => {
            const type = rand(0, 2);
            let x = rand(-5, 5); let y = rand(-5, 5);
            if (diff === 'easy') {
                if (type === 0) { // x = ay
                    let a = nonZeroRand(2, 4); x = a * y;
                    let c = x + y;
                    return { q: `\\begin{cases} x = ${a}y \\\\ x + y = ${c} \\end{cases}`, a: `x=${x}, y=${y}` };
                } else if (type === 1) { // 係数1
                    let c1 = x + y; let c2 = x - y;
                    return { q: `\\begin{cases} x + y = ${c1} \\\\ x - y = ${c2} \\end{cases}`, a: `x=${x}, y=${y}` };
                } else { // 代入法 y=...
                    let a = nonZeroRand(2, 3); let b = y - a*x;
                    let c = x + y;
                    return { q: `\\begin{cases} y = ${formatTerm(a,'x',true)} ${formatTerm(b,'',false)} \\\\ x + y = ${c} \\end{cases}`, a: `x=${x}, y=${y}` };
                }
            } else if (diff === 'normal') {
                if (type === 0) { // 片方倍数
                    let a = nonZeroRand(2, 4); let b = nonZeroRand(-3, 3); if(b===0) b=1;
                    let c1 = x + a*y; let c2 = 2*x + b*y;
                    return { q: `\\begin{cases} x ${formatTerm(a,'y',false)} = ${c1} \\\\ 2x ${formatTerm(b,'y',false)} = ${c2} \\end{cases}`, a: `x=${x}, y=${y}` };
                } else if (type === 1) { // 同じ係数
                    let a = nonZeroRand(2, 5); let b = nonZeroRand(2, 5); let c = nonZeroRand(-3, 3); if(c===0) c=-1;
                    if(b===c) c++;
                    let c1 = a*x + b*y; let c2 = a*x + c*y;
                    return { q: `\\begin{cases} ${formatTerm(a,'x',true)} ${formatTerm(b,'y',false)} = ${c1} \\\\ ${formatTerm(a,'x',true)} ${formatTerm(c,'y',false)} = ${c2} \\end{cases}`, a: `x=${x}, y=${y}` };
                } else { // 括弧あり
                    let c1 = x + y; let a = nonZeroRand(2, 3); let c2 = a*(x-y) + y;
                    return { q: `\\begin{cases} x + y = ${c1} \\\\ ${a}(x - y) + y = ${c2} \\end{cases}`, a: `x=${x}, y=${y}` };
                }
            } else {
                if (type === 0) { // 係数バラバラ
                    let a = rand(2, 4); let b = rand(3, 5);
                    let c = rand(3, 5); let d = rand(2, 4);
                    let c1 = a*x + b*y; let c2 = c*x - d*y;
                    return { q: `\\begin{cases} ${a}x + ${b}y = ${c1} \\\\ ${c}x - ${d}y = ${c2} \\end{cases}`, a: `x=${x}, y=${y}` };
                } else if (type === 1) { // 小数
                    let a = rand(1, 5); let b = rand(1, 5);
                    let c1 = (a*x + b*y)/10; let c2 = (x - y)/10;
                    return { q: `\\begin{cases} ${a/10}x + ${b/10}y = ${c1} \\\\ 0.1x - 0.1y = ${c2} \\end{cases}`, a: `x=${x}, y=${y}` };
                } else { // 分数
                    let a = choice([2, 3]); let b = choice([2, 4]);
                    while(x%a !== 0) x++; while(y%b !== 0) y++; // 整数になるように調整
                    let c1 = (x/a) + y; let c2 = x - (y/b);
                    return { q: `\\begin{cases} \\frac{x}{${a}} + y = ${c1} \\\\ x - \\frac{y}{${b}} = ${c2} \\end{cases}`, a: `x=${x}, y=${y}` };
                }
            }
        };

        const generateLinearFunctions = (diff) => {
            const type = rand(0, 2);
            if (diff === 'easy') {
                if (type === 0) { // 式を求める（傾きと切片）
                    let a = nonZeroRand(-5, 5); let b = nonZeroRand(-5, 5);
                    return { q: `傾きが${a}で、切片が${b}である直線の式を求めなさい。`, a: `y = ${formatTerm(a,'x',true)} ${formatTerm(b,'',false)}` };
                } else if (type === 1) { // yを求める
                    let a = nonZeroRand(-3, 3); let b = nonZeroRand(-5, 5); let x = rand(-3, 3);
                    return { q: `1次関数 y = ${formatTerm(a,'x',true)} ${formatTerm(b,'',false)} で、x=${x}のときのyの値を求めなさい。`, a: `y = ${a*x+b}` };
                } else { // xの増加量
                    let a = nonZeroRand(-5, 5); let b = nonZeroRand(-5, 5);
                    return { q: `1次関数 y = ${formatTerm(a,'x',true)} ${formatTerm(b,'',false)} で、xが1増加するときのyの増加量を求めなさい。`, a: `${a}` };
                }
            } else if (diff === 'normal') {
                if (type === 0) { // 2点から式
                    let a = nonZeroRand(-4, 4); let b = nonZeroRand(-5, 5);
                    let x1 = rand(-3, 1); let x2 = x1 + rand(1, 4);
                    return { q: `2点 (${x1}, ${a*x1+b}), (${x2}, ${a*x2+b}) を通る直線の式を求めなさい。`, a: `y = ${formatTerm(a,'x',true)} ${formatTerm(b,'',false)}` };
                } else if (type === 1) { // 平行な直線
                    let a = nonZeroRand(-4, 4); let b = nonZeroRand(-5, 5);
                    let px = rand(-3, 3); let py = a*px + b;
                    let dummy = rand(-5, 5); if(dummy===b) dummy++;
                    return { q: `直線 y = ${formatTerm(a,'x',true)} ${formatTerm(dummy,'',false)} に平行で、点(${px}, ${py})を通る直線の式を求めなさい。`, a: `y = ${formatTerm(a,'x',true)} ${formatTerm(b,'',false)}` };
                } else { // 変域
                    let a = nonZeroRand(-3, 3); let b = rand(-3, 3);
                    let x1 = rand(-2, 0); let x2 = rand(1, 3);
                    let y1 = a*x1+b; let y2 = a*x2+b;
                    return { q: `1次関数 y = ${formatTerm(a,'x',true)} ${formatTerm(b,'',false)} について、xの変域が ${x1} \\leqq x \\leqq ${x2} のときのyの変域を求めなさい。`, a: `${Math.min(y1,y2)} \\leqq y \\leqq ${Math.max(y1,y2)}` };
                }
            } else {
                if (type === 0) { // 交点
                    let x = rand(-3, 3); let y = rand(-3, 3);
                    let a1 = nonZeroRand(-3, 3); let b1 = y - a1*x;
                    let a2 = nonZeroRand(-3, 3); while(a1===a2) a2 = nonZeroRand(-3, 3);
                    let b2 = y - a2*x;
                    return { q: `2つの直線 y = ${formatTerm(a1,'x',true)} ${formatTerm(b1,'',false)} と y = ${formatTerm(a2,'x',true)} ${formatTerm(b2,'',false)} の交点の座標を求めなさい。`, a: `(${x}, ${y})` };
                } else if (type === 1) { // x軸との交点
                    let a = choice([2, -2, 3, -3, 4, -4]); let x = rand(2, 5); let b = -a*x;
                    return { q: `直線 y = ${formatTerm(a,'x',true)} ${formatTerm(b,'',false)} がx軸と交わる点の座標を求めなさい。`, a: `(${x}, 0)` };
                } else { // 変化の割合から
                    let a = nonZeroRand(-4, 4); let x1 = rand(1, 3); let x2 = rand(4, 6);
                    let incY = a * (x2 - x1);
                    return { q: `ある1次関数は、xが${x1}から${x2}まで増加するとき、yが${incY}増加し、点(0, ${rand(-5,5)})を通る。この関数の傾き(変化の割合)を求めなさい。`, a: `${a}` };
                }
            }
        };

        const generateProbabilities = (diff) => {
            const type = rand(0, 2);
            if (diff === 'easy') {
                if (type === 0) { // さいころ1個
                    let targets = [{t:'偶数',a:'\\frac{1}{2}'}, {t:'5以上',a:'\\frac{1}{3}'}, {t:'3の倍数',a:'\\frac{1}{3}'}, {t:'素数',a:'\\frac{1}{2}'}];
                    let tg = choice(targets);
                    return { q: `1つのさいころを投げるとき、${tg.t}の目が出る確率を求めなさい。`, a: tg.a };
                } else if (type === 1) { // 硬貨2枚
                    let targets = [{t:'2枚とも表',a:'\\frac{1}{4}'}, {t:'1枚が表で1枚が裏',a:'\\frac{1}{2}'}, {t:'少なくとも1枚は表',a:'\\frac{3}{4}'}];
                    let tg = choice(targets);
                    return { q: `2枚の硬貨を同時に投げるとき、${tg.t}になる確率を求めなさい。`, a: tg.a };
                } else { // カード1枚
                    let max = rand(5, 10); let hit = rand(2, 4);
                    let g = gcd(hit, max);
                    return { q: `1から${max}までの数字が書かれたカードが1枚ずつある。この中から1枚引くとき、指定された${hit}枚のどれかが出る確率を求めなさい。`, a: `${hit/g}/${max/g}`.replace('/1','') };
                }
            } else if (diff === 'normal') {
                if (type === 0) { // さいころ2個和
                    let sum = rand(4, 10); let ways = 0;
                    for(let i=1; i<=6; i++) for(let j=1; j<=6; j++) if(i+j===sum) ways++;
                    let g = gcd(ways, 36);
                    return { q: `2つのさいころを同時に投げるとき、出る目の和が${sum}になる確率を求めなさい。`, a: `\\frac{${ways/g}}{${36/g}}` };
                } else if (type === 1) { // さいころ2個同じ目
                    return { q: `2つのさいころを同時に投げるとき、同じ目が出る確率を求めなさい。`, a: `\\frac{1}{6}` };
                } else { // 玉を取り出す(戻す)
                    let r = rand(2, 4); let w = rand(2, 4); let t = r+w;
                    let g = gcd(r, t);
                    return { q: `赤玉${r}個、白玉${w}個が入った袋がある。1個取り出して色を確認し、袋に戻してからもう1個取り出す。2回とも赤玉が出る確率を求めなさい。`, a: `\\frac{${(r/g)*(r/g)}}{${(t/g)*(t/g)}}` };
                }
            } else {
                if (type === 0) { // さいころ2個積
                    let targets = [{t:'奇数', ways:9}, {t:'偶数', ways:27}, {t:'12の約数', ways:12}];
                    let tg = choice(targets); let g = gcd(tg.ways, 36);
                    return { q: `2つのさいころを同時に投げるとき、出る目の積が${tg.t}になる確率を求めなさい。`, a: `\\frac{${tg.ways/g}}{${36/g}}` };
                } else if (type === 1) { // 硬貨3枚
                    let targets = [{t:'3枚とも表', ways:1}, {t:'2枚が表で1枚が裏', ways:3}, {t:'少なくとも1枚は表', ways:7}];
                    let tg = choice(targets);
                    return { q: `3枚の硬貨を同時に投げるとき、${tg.t}になる確率を求めなさい。`, a: `\\frac{${tg.ways}}{8}` };
                } else { // 玉を取り出す(同時に)
                    let r = rand(2, 4); let w = rand(2, 4); let total = r + w;
                    let totalWays = total * (total - 1) / 2;
                    let ways = r * w; // 赤1白1
                    let g = gcd(ways, totalWays);
                    return { q: `赤玉${r}個、白玉${w}個が入った袋から、同時に2個の玉を取り出すとき、赤玉と白玉が1個ずつ出る確率を求めなさい。`, a: `\\frac{${ways/g}}{${totalWays/g}}` };
                }
            }
        };

        const generateExpansions = (diff) => {
            const type = rand(0, 2);
            if (diff === 'easy') {
                if (type === 0) { // (x+a)(x+b)
                    let a = nonZeroRand(-6, 6); let b = nonZeroRand(-6, 6);
                    return { q: `(x ${formatTerm(a,'',false)})(x ${formatTerm(b,'',false)})`, a: `x^2 ${formatTerm(a+b,'x',false)} ${formatTerm(a*b,'',false)}` };
                } else if (type === 1) { // (x+a)^2
                    let a = nonZeroRand(-6, 6);
                    return { q: `(x ${formatTerm(a,'',false)})^2`, a: `x^2 ${formatTerm(2*a,'x',false)} + ${a*a}` };
                } else { // (x+a)(x-a)
                    let a = rand(2, 8);
                    return { q: `(x + ${a})(x - ${a})`, a: `x^2 - ${a*a}` };
                }
            } else if (diff === 'normal') {
                if (type === 0) { // (ax+b)(cx+d)
                    let a = rand(2, 4); let c = rand(2, 4);
                    let b = nonZeroRand(-5, 5); let d = nonZeroRand(-5, 5);
                    return { q: `(${a}x ${formatTerm(b,'',false)})(${c}x ${formatTerm(d,'',false)})`, a: `${a*c}x^2 ${formatTerm(a*d+b*c,'x',false)} ${formatTerm(b*d,'',false)}` };
                } else if (type === 1) { // (x+ay)^2
                    let a = nonZeroRand(-5, 5); if(a===1) a=2;
                    return { q: `(x ${formatTerm(a,'y',false)})^2`, a: `x^2 ${formatTerm(2*a,'xy',false)} + ${a*a}y^2` };
                } else { // 展開の加減
                    let a = nonZeroRand(1, 4); let b = nonZeroRand(1, 4);
                    return { q: `(x + ${a})(x - ${a}) + (x - ${b})^2`, a: `2x^2 ${formatTerm(-2*b,'x',false)} ${formatTerm(-a*a + b*b,'',false)}` };
                }
            } else {
                if (type === 0) { // おきかえ (x+y+a)(x+y-a)
                    let a = rand(2, 5);
                    return { q: `(x + y + ${a})(x + y - ${a})`, a: `x^2 + 2xy + y^2 - ${a*a}` };
                } else if (type === 1) { // おきかえ2 (x+y+a)(x+y+b)
                    let a = nonZeroRand(-4, 4); let b = nonZeroRand(-4, 4);
                    return { q: `(a - b ${formatTerm(a,'',false)})(a - b ${formatTerm(b,'',false)})`, a: `a^2 - 2ab + b^2 ${formatTerm(a+b,'a',false)} ${formatTerm(-(a+b),'b',false)} ${formatTerm(a*b,'',false)}` };
                } else { // 工夫して計算
                    let a = rand(1, 5);
                    return { q: `(x - ${a})(x + ${a})(x^2 + ${a*a})`, a: `x^4 - ${a*a*a*a}` };
                }
            }
        };

        const generateFactorizations = (diff) => {
            const type = rand(0, 2);
            if (diff === 'easy') {
                if (type === 0) { // 共通因数
                    let a = rand(2, 6); let b = rand(2, 6);
                    return { q: `${a}x^2 + ${a*b}x`, a: `${a}x(x + ${b})` };
                } else if (type === 1) { // x^2+(a+b)x+ab
                    let a = nonZeroRand(-5, 5); let b = nonZeroRand(-5, 5);
                    return { q: `x^2 ${formatTerm(a+b,'x',false)} ${formatTerm(a*b,'',false)}`, a: `(x ${formatTerm(a,'',false)})(x ${formatTerm(b,'',false)})` };
                } else { // x^2-a^2
                    let a = rand(2, 8);
                    return { q: `x^2 - ${a*a}`, a: `(x + ${a})(x - ${a})` };
                }
            } else if (diff === 'normal') {
                if (type === 0) { // x^2+2ax+a^2
                    let a = nonZeroRand(-8, 8);
                    return { q: `x^2 ${formatTerm(2*a,'x',false)} + ${a*a}`, a: `(x ${formatTerm(a,'',false)})^2` };
                } else if (type === 1) { // 共通因数くくってから公式
                    let k = rand(2, 5); let a = rand(2, 5);
                    return { q: `${k}x^2 - ${k*a*a}`, a: `${k}(x + ${a})(x - ${a})` };
                } else { // 文字2つ
                    let a = nonZeroRand(-5, 5); let b = nonZeroRand(-5, 5);
                    return { q: `x^2 ${formatTerm(a+b,'xy',false)} ${formatTerm(a*b,'y^2',false)}`, a: `(x ${formatTerm(a,'y',false)})(x ${formatTerm(b,'y',false)})` };
                }
            } else {
                if (type === 0) { // ax^2 - ay^2
                    let a = rand(2, 5); let b = rand(2, 5);
                    return { q: `${a}x^2 - ${a*b*b}y^2`, a: `${a}(x + ${b}y)(x - ${b}y)` };
                } else if (type === 1) { // おきかえ (x+y)^2...
                    let a = nonZeroRand(-4, 4); let b = nonZeroRand(-4, 4);
                    return { q: `(x+y)^2 ${formatTerm(a+b,'(x+y)',false)} ${formatTerm(a*b,'',false)}`, a: `(x+y ${formatTerm(a,'',false)})(x+y ${formatTerm(b,'',false)})` };
                } else { // 4項
                    return { q: `xy + x - y - 1`, a: `(x - 1)(y + 1)` };
                }
            }
        };

        const generateSquareRoots = (diff) => {
            const primes = [2, 3, 5, 7];
            const type = rand(0, 2);
            if (diff === 'easy') {
                if (type === 0) { // √a * √b
                    let p1 = choice(primes); let p2 = choice(primes.filter(x=>x!==p1));
                    return { q: `\\sqrt{${p1}} \\times \\sqrt{${p2}}`, a: `\\sqrt{${p1*p2}}` };
                } else if (type === 1) { // a√bにする
                    let a = rand(2, 4); let p = choice(primes);
                    return { q: `\\sqrt{${a*a*p}} を a\\sqrt{b} の形にしなさい。`, a: `${a}\\sqrt{${p}}` };
                } else { // 同類項の加減
                    let p = choice(primes); let a = rand(2, 6); let b = rand(2, 6);
                    return { q: `${a}\\sqrt{${p}} - ${b}\\sqrt{${p}}`, a: `${formatTerm(a-b,'\\sqrt{'+p+'}',true)}` || '0' };
                }
            } else if (diff === 'normal') {
                if (type === 0) { // 有理化
                    let p = choice([2, 3, 5]); let a = p * rand(2, 4);
                    return { q: `\\frac{${a}}{\\sqrt{${p}}}`, a: `${a/p}\\sqrt{${p}}` };
                } else if (type === 1) { // ルートの乗法(中身が同じになる)
                    let p = choice(primes); let a = rand(2, 4);
                    return { q: `\\sqrt{${p}} \\times \\sqrt{${a*a*p}}`, a: `${a*p}` };
                } else { // 分配法則
                    let p = choice([2,3]); let p2 = choice([5,7]);
                    return { q: `\\sqrt{${p}}(\\sqrt{${p}} + \\sqrt{${p2}})`, a: `${p} + \\sqrt{${p*p2}}` };
                }
            } else {
                if (type === 0) { // 乗法公式 (√a + b)^2
                    let p = choice([2, 3, 5]); let a = nonZeroRand(-4, 4);
                    return { q: `(\\sqrt{${p}} ${formatTerm(a,'',false)})^2`, a: `${p + a*a} ${formatTerm(2*a,'\\sqrt{'+p+'}',false)}` };
                } else if (type === 1) { // 乗法公式 (√a + √b)(√a - √b)
                    let p1 = choice([3, 5, 7]); let p2 = choice([2, 3]); while(p1===p2) p2++;
                    return { q: `(\\sqrt{${p1}} + \\sqrt{${p2}})(\\sqrt{${p1}} - \\sqrt{${p2}})`, a: `${p1 - p2}` };
                } else { // 複雑な加減
                    let p = choice([2, 3]); let a = rand(2, 4); let b = rand(2, 4);
                    return { q: `\\sqrt{${a*a*p}} + \\frac{${b*p}}{\\sqrt{${p}}}`, a: `${a+b}\\sqrt{${p}}` };
                }
            }
        };

        const generateQuadratic = (diff) => {
            const type = rand(0, 2);
            if (diff === 'easy') {
                if (type === 0) { // 因数分解利用 x^2+(a+b)x+ab=0
                    let a = nonZeroRand(-5, 5); let b = nonZeroRand(-5, 5);
                    return { q: `x^2 ${formatTerm(a+b,'x',false)} ${formatTerm(a*b,'',false)} = 0`, a: `x = ${-a}, ${-b}` };
                } else if (type === 1) { // x^2 = a
                    let a = rand(2, 9);
                    return { q: `x^2 = ${a*a}`, a: `x = \\pm ${a}` };
                } else { // (x+a)^2 = 0
                    let a = nonZeroRand(-6, 6);
                    return { q: `x^2 ${formatTerm(2*a,'x',false)} + ${a*a} = 0`, a: `x = ${-a}` };
                }
            } else if (diff === 'normal') {
                if (type === 0) { // (x+a)^2 = b
                    let a = nonZeroRand(-5, 5); let b = choice([2, 3, 5, 7]);
                    return { q: `(x ${formatTerm(a,'',false)})^2 = ${b}`, a: `x = ${-a} \\pm \\sqrt{${b}}` };
                } else if (type === 1) { // 解の公式 (単純)
                    let b = choice([3, 5, 7]); let c = choice([-1, -2, -3]);
                    let d = b*b - 4*c;
                    return { q: `x^2 + ${b}x ${formatTerm(c,'',false)} = 0`, a: `x = \\frac{-${b} \\pm \\sqrt{${d}}}{2}` };
                } else { // 共通因数でくくる 2x^2 - 8x = 0
                    let a = rand(2, 4); let b = nonZeroRand(-5, 5);
                    return { q: `${a}x^2 ${formatTerm(a*b,'x',false)} = 0`, a: `x = 0, ${-b}` };
                }
            } else {
                if (type === 0) { // 展開して整理 (x+a)(x+b) = c
                    let a = rand(1, 3); let b = rand(-3, -1);
                    let c = a * b - 12; // x^2+(a+b)x+12=0 => 解を求める
                    // 簡単のため、解の公式が綺麗になるように調整
                    return { q: `(x + 2)(x - 4) = 7`, a: `x = 1 \\pm \\sqrt{16}` }; // 調整版固定
                } else if (type === 1) { // 解の公式 (約分あり)
                    let b = choice([2, 4, 6]); let c = choice([-1, -3, -5]);
                    let d = (b/2)*(b/2) - c;
                    return { q: `x^2 + ${b}x ${formatTerm(c,'',false)} = 0`, a: `x = ${-b/2} \\pm \\sqrt{${d}}` };
                } else { // 係数決定
                    let ans = rand(2, 5); let a = rand(-5, 5);
                    let c = -(ans*ans + a*ans);
                    return { q: `2次方程式 x^2 ${formatTerm(a,'x',false)} + c = 0 の1つの解が x=${ans} であるとき、cの値を求めなさい。`, a: `c = ${c}` };
                }
            }
        };

        const generators = {
            integers: generateIntegers,
            algebraic_expressions: generateAlgebraic,
            linear_equations: generateLinearEquations,
            proportions: generateProportions,
            data_analysis: generateDataAnalysis,
            polynomial_calculations: generatePolynomials,
            simultaneous_equations: generateSimultaneous,
            linear_functions: generateLinearFunctions,
            probabilities: generateProbabilities,
            expansions: generateExpansions,
            factorizations: generateFactorizations,
            square_roots: generateSquareRoots,
            quadratic_equations: generateQuadratic,
        };

        // --- Math Renderer ---
        const renderContent = (str) => {
            if (!str) return null;
            
            // 連立方程式
            if (str.includes('\\begin{cases}')) {
                const parts = str.match(/\\begin\{cases\}\s*(.*?)\s*\\\\\s*(.*?)\s*\\end\{cases\}/);
                if (parts) {
                    return (
                        <div className="flex items-center">
                            <div className="text-4xl sm:text-5xl font-light text-gray-800 mr-2 sm:mr-3 mt-1 leading-none">{'{'}</div>
                            <div className="flex flex-col gap-1 sm:gap-2 text-lg sm:text-xl font-serif tracking-widest">
                                <div>{renderContent(parts[1])}</div>
                                <div>{renderContent(parts[2])}</div>
                            </div>
                        </div>
                    );
                }
            }

            // 記号置換
            let processedStr = str.replace(/\\times/g, '×').replace(/\\div/g, '÷').replace(/\\pm/g, '±').replace(/\\leqq/g, '≦');

            // 分数とルートのパース
            const tokens = processedStr.split(/(\\frac{[^{}]+}{[^{}]+}|\\sqrt{[^{}]+})/g);
            
            return (
                <span className="inline-flex items-center flex-wrap leading-loose">
                    {tokens.map((token, i) => {
                        if (token.startsWith('\\frac')) {
                            const match = /\\frac{([^{}]+)}{([^{}]+)}/.exec(token);
                            if (match) {
                                return (
                                    <span key={i} className="inline-flex flex-col items-center justify-center align-middle mx-1.5 -translate-y-1">
                                        <span className="border-b border-gray-800 px-1 text-[0.8em] leading-none pb-0.5">{renderSimpleMath(match[1])}</span>
                                        <span className="text-[0.8em] leading-none pt-0.5">{renderSimpleMath(match[2])}</span>
                                    </span>
                                );
                            }
                        } else if (token.startsWith('\\sqrt')) {
                            const match = /\\sqrt{([^{}]+)}/.exec(token);
                            if (match) {
                                return (
                                    <span key={i} className="whitespace-nowrap inline-flex items-center mx-0.5">
                                        <span className="text-[1.1em] leading-none -mr-[1px] translate-y-[2px]">&radic;</span>
                                        <span className="border-t border-gray-800 pt-[1px] leading-none tracking-normal pr-0.5">{renderSimpleMath(match[1])}</span>
                                    </span>
                                );
                            }
                        }
                        return <span key={i} className="inline-block leading-relaxed">{renderSimpleMath(token)}</span>;
                    })}
                </span>
            );
        };

        const renderSimpleMath = (str) => {
            const parts = str.split(/\^([0-9]+|[a-zA-Z])/);
            if (parts.length === 1) return str;
            return (
                <React.Fragment>
                    {parts.map((part, i) => {
                        if (i % 2 === 1) {
                            return <sup key={i} className="text-[0.7em] align-super font-serif">{part}</sup>;
                        }
                        return <React.Fragment key={i}>{part}</React.Fragment>;
                    })}
                </React.Fragment>
            );
        };

        // --- Main App ---
        function App() {
            const [selectedUnits, setSelectedUnits] = useState(['integers', 'linear_equations', 'simultaneous_equations', 'expansions']);
            const [count, setCount] = useState(10);
            const [difficulty, setDifficulty] = useState('normal');
            const [problems, setProblems] = useState([]);
            const [showAnswers, setShowAnswers] = useState(false);
            const [error, setError] = useState('');

            const unitsGrouped = [
                {
                    grade: '中学1年',
                    items: [
                        { id: 'integers', name: '正負の数の計算' },
                        { id: 'algebraic_expressions', name: '文字式の計算' },
                        { id: 'linear_equations', name: '1次方程式' },
                        { id: 'proportions', name: '比例・反比例' },
                        { id: 'data_analysis', name: 'データの活用' },
                    ]
                },
                {
                    grade: '中学2年',
                    items: [
                        { id: 'polynomial_calculations', name: '式の計算 (乗除)' },
                        { id: 'simultaneous_equations', name: '連立方程式' },
                        { id: 'linear_functions', name: '1次関数' },
                        { id: 'probabilities', name: '確率' },
                    ]
                },
                {
                    grade: '中学3年',
                    items: [
                        { id: 'expansions', name: '式の展開' },
                        { id: 'factorizations', name: '因数分解' },
                        { id: 'square_roots', name: '平方根の計算' },
                        { id: 'quadratic_equations', name: '2次方程式' },
                    ]
                }
            ];

            const toggleUnit = (unitId) => {
                setSelectedUnits(prev => {
                    if (prev.includes(unitId)) return prev.filter(id => id !== unitId);
                    return [...prev, unitId];
                });
            };

            const toggleAll = () => {
                const allIds = unitsGrouped.flatMap(g => g.items.map(i => i.id));
                if (selectedUnits.length === allIds.length) {
                    setSelectedUnits([]);
                } else {
                    setSelectedUnits(allIds);
                }
            };

            const generate = () => {
                if (selectedUnits.length === 0) {
                    setError('1つ以上の単元を選択してください。');
                    setProblems([]);
                    return;
                }
                setError('');

                const newProblems = [];
                let attempts = 0;
                const maxAttempts = count * 50;

                while (newProblems.length < count && attempts < maxAttempts) {
                    const randomUnitId = selectedUnits[Math.floor(Math.random() * selectedUnits.length)];
                    const newProblem = generators[randomUnitId](difficulty);
                    
                    const isDuplicate = newProblems.some(p => p.q === newProblem.q);
                    if (!isDuplicate) {
                        newProblems.push(newProblem);
                    }
                    attempts++;
                }

                let fallbackAttempts = 0;
                while (newProblems.length < count && fallbackAttempts < 100) {
                    const randomUnitId = selectedUnits[Math.floor(Math.random() * selectedUnits.length)];
                    let newProblem = generators[randomUnitId](difficulty);
                    let suffix = " ".repeat(newProblems.length); 
                    newProblems.push({ q: newProblem.q + suffix, a: newProblem.a });
                    fallbackAttempts++;
                }

                setProblems(newProblems);
                setShowAnswers(false);
            };

            useEffect(() => {
                if (selectedUnits.length > 0) {
                    generate();
                } else {
                    setProblems([]);
                    setError('1つ以上の単元を選択してください。');
                }
            }, [selectedUnits, count, difficulty]);

            const print = () => window.print();

            const getTestTitle = () => {
                if (selectedUnits.length === 1) {
                    const allItems = unitsGrouped.flatMap(g => g.items);
                    return allItems.find(u => u.id === selectedUnits[0])?.name + ' 小テスト';
                }
                return '数学 総合復習プリント';
            };

            return (
                <div className="min-h-screen bg-gray-100 p-4 sm:p-6 lg:p-8 font-sans text-gray-900 print:bg-white print:p-0">
                    <div className="max-w-[1400px] mx-auto flex flex-col lg:flex-row gap-6 lg:gap-8 print:block print:max-w-none print:mx-0">
                        
                        {/* 左側コントロールパネル (印刷時非表示) */}
                        <div className="w-full lg:w-[320px] shrink-0 print:hidden">
                            <div className="bg-white p-5 sm:p-6 rounded-xl shadow-md lg:sticky lg:top-8 lg:max-h-[calc(100vh-4rem)] overflow-y-auto flex flex-col gap-6 custom-scrollbar">
                                <div>
                                    <h1 className="text-xl font-bold text-gray-800 mb-1">小テスト作成ツール</h1>
                                    <p className="text-xs text-gray-500 leading-relaxed">設定を変更すると、右側のプリントにリアルタイムで問題が自動生成されます。</p>
                                </div>

                                {/* 単元選択 */}
                                <div>
                                    <div className="flex justify-between items-end mb-2">
                                        <label className="block text-sm font-bold text-gray-700">出題単元</label>
                                        <button onClick={toggleAll} className="text-xs text-blue-600 hover:text-blue-800 font-medium">
                                            {selectedUnits.length >= 10 ? 'すべて解除' : 'すべて選択'}
                                        </button>
                                    </div>
                                    
                                    <div className="space-y-3">
                                        {unitsGrouped.map((group, idx) => (
                                            <div key={idx} className="bg-gray-50 p-3 rounded-lg border border-gray-200">
                                                <h3 className="text-xs font-bold text-gray-500 mb-2 border-b pb-1">{group.grade}</h3>
                                                <div className="flex flex-col gap-1">
                                                    {group.items.map(u => (
                                                        <label key={u.id} className="flex items-center p-1.5 rounded hover:bg-gray-200 cursor-pointer transition-colors">
                                                            <input 
                                                                type="checkbox" 
                                                                className="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
                                                                checked={selectedUnits.includes(u.id)}
                                                                onChange={() => toggleUnit(u.id)}
                                                            />
                                                            <span className="ml-2 text-sm text-gray-700 font-medium">{u.name}</span>
                                                        </label>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    {error && <p className="text-red-500 text-xs mt-2 font-bold">{error}</p>}
                                </div>

                                {/* 難易度と問題数 */}
                                <div className="space-y-4 border-t pt-4 border-gray-100">
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">難易度</label>
                                        <select 
                                            value={difficulty} 
                                            onChange={(e) => setDifficulty(e.target.value)}
                                            className="w-full bg-gray-50 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 p-2.5 outline-none transition-shadow text-sm font-medium"
                                        >
                                            <option value="easy">基本 (ウォーミングアップ)</option>
                                            <option value="normal">標準 (定期テストレベル)</option>
                                            <option value="hard">応用 (入試基礎レベル)</option>
                                        </select>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">問題数</label>
                                        <select 
                                            value={count} 
                                            onChange={(e) => setCount(Number(e.target.value))}
                                            className="w-full bg-gray-50 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 p-2.5 outline-none transition-shadow text-sm font-medium"
                                        >
                                            <option value={5}>5問</option>
                                            <option value={10}>10問 (約10分)</option>
                                            <option value={15}>15問</option>
                                            <option value={20}>20問</option>
                                        </select>
                                    </div>
                                </div>

                                {/* アクションボタン */}
                                <div className="space-y-2.5 border-t pt-4 border-gray-100">
                                    <button 
                                        onClick={generate}
                                        disabled={selectedUnits.length === 0}
                                        className="w-full flex items-center justify-center gap-1.5 bg-blue-50 hover:bg-blue-100 text-blue-700 font-medium py-2.5 px-4 rounded-lg transition-colors text-sm border border-blue-200 disabled:opacity-50 disabled:cursor-not-allowed"
                                    >
                                        <RefreshIcon />
                                        別の問題を生成
                                    </button>

                                    <button 
                                        onClick={() => setShowAnswers(!showAnswers)}
                                        disabled={selectedUnits.length === 0}
                                        className="w-full flex items-center justify-center gap-1.5 bg-gray-50 hover:bg-gray-100 text-gray-700 font-medium py-2.5 px-4 rounded-lg transition-colors text-sm border border-gray-200 disabled:opacity-50 disabled:cursor-not-allowed"
                                    >
                                        {showAnswers ? <EyeOffIcon /> : <EyeIcon />}
                                        {showAnswers ? '解答を隠す' : '解答を表示'}
                                    </button>

                                    <button 
                                        onClick={print}
                                        disabled={selectedUnits.length === 0}
                                        className="w-full flex items-center justify-center gap-1.5 bg-gray-800 hover:bg-gray-900 text-white font-medium py-2.5 px-4 rounded-lg transition-colors text-sm shadow-sm disabled:opacity-50 disabled:cursor-not-allowed"
                                    >
                                        <PrinterIcon />
                                        プリントを印刷
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* 右側 プリントプレビュー */}
                        <div className="flex-1 flex justify-center print:block">
                            <div className="w-full max-w-4xl bg-white p-8 sm:p-12 md:p-16 rounded-xl shadow-md print:shadow-none print:p-0 min-h-[297mm]">
                                
                                <div className="flex flex-col sm:flex-row sm:justify-between sm:items-end border-b-2 border-gray-800 pb-4 mb-8 sm:mb-10 gap-4">
                                    <h2 className="text-xl sm:text-2xl md:text-3xl font-bold text-gray-900 tracking-tight">
                                        {getTestTitle()}
                                    </h2>
                                    <div className="flex gap-3 sm:gap-4 text-sm sm:text-base font-medium text-gray-800 shrink-0">
                                        <div className="border-b border-gray-400 w-12 sm:w-16 text-center pb-1">　年</div>
                                        <div className="border-b border-gray-400 w-12 sm:w-16 text-center pb-1">　組</div>
                                        <div className="border-b border-gray-400 w-12 sm:w-16 text-center pb-1">　番</div>
                                        <div className="border-b border-gray-400 w-24 sm:w-40 pb-1">氏名</div>
                                    </div>
                                </div>

                                {problems.length > 0 ? (
                                    <div className="grid gap-x-8 sm:gap-x-12 md:gap-x-16 gap-y-8 sm:gap-y-12 grid-cols-1 md:grid-cols-2">
                                        {problems.map((p, i) => (
                                            <div key={i} className="flex gap-3 sm:gap-4 break-inside-avoid">
                                                <div className="font-bold text-lg sm:text-xl text-gray-800 w-6 sm:w-8 shrink-0 mt-0.5">({i + 1})</div>
                                                <div className="flex flex-col gap-4 sm:gap-6 w-full">
                                                    <div className="min-h-[2.5rem] flex items-center text-gray-900 text-base sm:text-lg">
                                                        {renderContent(p.q)}
                                                    </div>
                                                    
                                                    {showAnswers ? (
                                                        <div className="text-red-600 font-bold border-b-2 border-red-200 pb-2 pl-2 text-base sm:text-lg mt-auto">
                                                            答. {renderContent(p.a)}
                                                        </div>
                                                    ) : (
                                                        <div className="border-b border-dashed border-gray-400 pb-2 h-6 sm:h-8 w-full mt-auto"></div>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="flex items-center justify-center h-64 text-gray-400 text-lg">
                                        {error ? '左のパネルから単元を選択してください。' : '問題を生成しています...'}
                                    </div>
                                )}
                                
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        // Reactアプリのレンダリング
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
